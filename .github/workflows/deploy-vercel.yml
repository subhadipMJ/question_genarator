name: Deploy Next.js to Vercel

on:
  push:
    branches:
      - main

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production configuration
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token="$VERCEL_TOKEN"

      - name: Build project
        run: |
          vercel build \
            --prod \
            --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy \
            --prebuilt \
            --prod \
            --token="$VERCEL_TOKEN")

          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployment completed: $DEPLOYMENT_URL"

      - name: Send Telegram success notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=✅ Vercel deployment completed

          Project: ${REPOSITORY}
          Branch: ${BRANCH}
          Pushed by: ${ACTOR}
          Commit: ${COMMIT_MESSAGE}

          Deployment:
          ${DEPLOYMENT_URL}

          GitHub Actions:
          https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"

      - name: Send Telegram failure notification
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=❌ Vercel deployment failed

          Project: ${REPOSITORY}
          Branch: ${BRANCH}
          Pushed by: ${ACTOR}
          Commit: ${COMMIT_MESSAGE}

          View failure:
          https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"